name: Mongolia News Monitor

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 10 * * *'
    - cron: '0 13 * * *'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Show Python Version
        run: |
          python --version

      - name: Install Packages
        run: |
          pip install feedparser

      - name: Test RSS Fetcher
        run: |
          python scripts/rss_fetcher.py

      - name: Workflow Ready
        run: |
          echo "Mongolia News Monitor Initialized"
